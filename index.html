<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupus Topluluk Takvimi</title>

    
    <!-- Şirketsel ve Premium Yazı Tipi -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">


    <style>
        /* 1. GENEL SAYFA DÜZENİ */
        body { 
            font-family: 'Plus Jakarta Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 25px;
            background-color: #1e293b; /* İstediğiniz düz, koyu gece mavisi tonu */ 
            color: #1a202c;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1400px;
        }

        h1 { 
            text-align: center; 
            color: #ffffff !important; 
            font-size: 34px;
            margin-top: 20px;
            margin-bottom: 25px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.15); 
        }

        /* 2. ÜST KONTROL PANELİ VE ULTRA CANLI BUTONLAR */
        .controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            background: #ffffff;
            padding: 20px 35px;
            border-radius: 32px; /* Ultra yuvarlak premium panel */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); /* Derin gölge etkisi */
        }

        /* Panel İçindeki Sol Taraf Filtre Butonlarının Yeni Canlı Hali */
        .controls button:not(.btn-add):not(.btn) {
            padding: 12px 24px !important;
            font-size: 14px !important;
            font-weight: 850 !important; /* Yazıları pürüzsüz ve çok kalın yapar */
            border-radius: 20px !important; 
            border: none !important;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18) !important;
        }

        .controls button:not(.btn-add):not(.btn):hover {
            transform: translateY(-2px) scale(1.03);
            filter: brightness(1.1);
        }

        /* Görseldeki Sıralamaya Göre Butonların Canlı Renk Atamaları */
        .controls button:nth-child(1) { background-color: #00d2ff !important; color: #003543 !important; } /* Üyeler */
        .controls button:nth-child(2) { background-color: #ffe600 !important; color: #2b2600 !important; } /* Takımlar */
        .controls button:nth-child(3) { background-color: #ff007f !important; color: #ffffff !important; } /* Akademik */
        .controls button:nth-child(4) { background-color: #7c3aed !important; color: #ffffff !important; } /* Şirket / Havuz */

        #month-title { 
            font-size: 24px; 
            font-weight: 900; 
            color: #0f172a;
            margin: 0 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Ay Değiştirme Butonları (Önceki - Sonraki Ay) */
        .btn { 
            padding: 12px 24px; 
            font-size: 14px; 
            font-weight: 700;
            cursor: pointer; 
            background-color: #ffffff; 
            color: #475569; 
            border: 1px solid #e2e8f0; 
            border-radius: 16px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover { 
            background-color: #f8fafc; 
            border-color: #3b82f6;
            color: #3b82f6;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1);
        }

        /* Mavi Görev Ekleme Butonu */
        .btn-add { 
            background: linear-gradient(135deg, #2563eb, #1d4ed8) !important; 
            color: white !important; 
            border: none !important; 
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 800;
            border-radius: 20px; 
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4) !important;
            letter-spacing: 0.3px;
        }

        .btn-add:hover { 
            background: linear-gradient(135deg, #1d4ed8, #1e40af) !important;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.6) !important;
            transform: translateY(-2px) scale(1.02);
        }

        /* 3. MODERN TAKVİM PANELİ VE HÜCRE YAPISI */
        .calendar-container { 
            overflow-x: auto !important; 
            background: #f8fafc; /* Hafif mat, premium şık gri-mavi zemin */
            padding: 24px; 
            border-radius: 35px; /* Çok yuvarlak modern kenar kesimi */
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25); 
            border: 1px solid #e2e8f0;
            width: 100%;
            box-sizing: border-box;
        }

        table { 
            border-collapse: separate; 
            border-spacing: 6px 10px; /* Hücrelerin arasındaki boşluklar */
            width: 100%; 
            min-width: 950px; 
        }

        th, td { 
            border: none;
            padding: 16px 12px; 
            text-align: center; 
            min-width: 55px; 
            font-size: 14px;
            border-radius: 14px; /* Hücre kenarlarını tam istediğiniz kavis seviyesine getirdik */
        }

        th { 
            background-color: #e2e8f0; 
            color: #334155;
            font-weight: 800;
            font-size: 14px;
            padding: 14px;
        }

        /* Boş Gün Hücreleri */
        td {
            background-color: #ffffff; 
            border: 1px solid #f1f5f9 !important; 
            color: #94a3b8;
            transition: all 0.2s ease;
        }

        td:not(.row-header):not(.task-strip):not(.status-available):not(.status-busy):hover {
            background-color: #f1f5f9; 
            transform: scale(1.05);
            z-index: 5;
        }

        /* 4. SOL SABİT LİSTE SÜTUNLARI VE KATEGORİ RENKLERİ */
        .row-header { 
            text-align: left; 
            font-weight: 800; 
            min-width: 280px; 
            color: white !important; 
            padding-left: 20px;
            box-shadow: 5px 0 15px -5px rgba(0,0,0,0.05);
            border: none !important; 
            position: sticky;
            left: 0;
            z-index: 10;
        }

        .calendar-table th:first-child {
            background-color: transparent;
            color: #0f172a;
            font-weight: 900;
            position: sticky;
            left: 0;
            z-index: 10;
        }

        /* Sol Kategori Başlık Renkleri */
        .group-member { background-color: #00d2ff !important; color: #003543 !important; }   
        .group-team { background-color: #ffe600 !important; color: #2b2600 !important; }
        .group-academic { background-color: #ff007f !important; color: #ffffff !important; } 

        /* Takımın Altındaki Üye Satır Başlıkları (İçeri doğru basamak yapısı) */
        .row-sub-header {
            text-align: left;
            font-weight: 600;
            min-width: 280px;
            color: #e2e8f0 !important; 
            padding-left: 40px !important; 
            background-color: #334155 !important; /* Koyu gri-mavi kırılım rengi */
            font-size: 13px;
            border: none !important;
            position: sticky;
            left: 0;
            z-index: 10;
        }

        /* 5. GÖREV ŞERİTLERİ VE YAN ÇİZGİ SEGMENLERİ */
        .task-strip {
            font-weight: 700;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
            transition: all 0.2s ease;
            position: relative;
        }
        
        .task-strip:hover {
            transform: scale(1.03);
            filter: brightness(1.05);
        }

        .task-member {
            background-color: #e6faff !important; 
            color: #007791 !important;            
            border-left: 5px solid #00d2ff !important; 
            border-right: 5px solid #00d2ff !important; 
        }

        .task-team {
            background-color: #fffde6 !important; 
            color: #6a5d00 !important;            
            border-left: 5px solid #ffe600 !important; 
            border-right: 5px solid #ffe600 !important;
        }

        .task-academic {
            background-color: #ffe6f2 !important; 
            color: #b30059 !important;            
            border: 2px solid #ff007f !important; 
        }

        /* ORTAK MÜSAİTLİK DURUM RENKLERİ */
        .status-available {
            background-color: #c7eed8 !important; 
            color: #1c5235 !important;            
            font-weight: 800;
            box-shadow: 0 2px 6px rgba(199, 238, 216, 0.4);
        }

        .status-busy {
            background-color: #ff3131 !important; /* Neon Ateş Kırmızısı */
            color: #ffffff !important;
            font-weight: 800;
            box-shadow: 0 2px 6px rgba(255, 49, 49, 0.3);
        }

        /* BUGÜNÜN GÜNÜ PARLAMA EFEKTİ */
        .today-highlight {
            background: linear-gradient(135deg, #ff007f, #7c3aed) !important; 
            color: #ffffff !important;
            font-weight: 900 !important;
            font-size: 15px !important;
            box-shadow: 0 0 12px rgba(124, 58, 237, 0.6);
        }

        /* MOBİL VE OK BUTONLARI DÜZENLERİ */
        .scroll-btn-container {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 12px;
            width: 100%;
        }
        
        .btn-scroll {
            padding: 10px 16px;
            font-size: 16px;
            font-weight: bold;
            background-color: #ffffff;
            color: #1e293b;
            border: 1px solid #cbd5e1;
            border-radius: 50%; 
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-scroll:hover {
            background-color: #3b82f6;
            color: #ffffff;
            border-color: #3b82f6;
        }

        @media screen and (max-width: 768px) {
            body { padding: 12px !important; }
            h1 { font-size: 24px !important; margin-bottom: 15px !important; }
            .controls { flex-direction: column !important; gap: 12px !important; padding: 15px !important; border-radius: 20px !important; }
            #month-title { font-size: 18px !important; margin: 5px 0 !important; }
            .controls .btn, .btn-add { width: 100% !important; justify-content: center !important; }
        }

        /* 📌 TAKIM FİLTRESİ BAŞLIĞINI BEYAZ VE NET YAPAR */
        #takimFiltrePanel, 
        .filter-container,
        div {
            /* Bu alan panelin genel yazı rengini beyaz yapar */
            color: #ffffff !important; 
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.3px;
        }

        /* Eğer yazı bir etiket veya başlık içindeyse doğrudan beyaz yapar */
        #takimFiltrePanel h3,
        #takimFiltrePanel label,
        #takimFiltrePanel span {
            color: #ffffff !important;
            font-weight: 800 !important;
    }

        /* 🎯 HIZLI EKLEME ARTI (+) BUTONLARINI KİBARLAŞTIRMA VE KÖŞEYE ALMA */
        
        /* Önce artı butonunun içinde durduğu hücreyi temel alıyoruz */
        .calendar-table td, td {
            position: relative !important;
        }

        /* Artı butonunun yeni kibar, yuvarlak ve modern stili */
        .btn-quick-add, 
        td button:not(.btn-add):not(.btn-filter) {
            position: absolute !important;
            top: 4px !important;
            right: 4px !important;
            width: 18px !important;
            height: 18px !important;
            min-width: 18px !important;
            padding: 0 !important;
            margin: 0 !important;
            
            /* Tasarım Detayları */
            background-color: #0f172a !important; /* Şık koyu gece grisi */
            color: #ffffff !important;
            border: none !important;
            border-radius: 50% !important; /* Tam yuvarlak kibar buton */
            
            /* Yazı ve Hizalama */
            font-size: 11px !important;
            font-weight: 800 !important;
            line-height: 18px !important;
            text-align: center !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            
            /* Animasyon ve Gizlilik */
            cursor: pointer !important;
            opacity: 0 !important; /* Normalde görünmez, gizli kalır */
            transform: scale(0.8) !important;
            transition: all 0.2s ease-in-out !important;
            z-index: 10 !important;
        }

        /* 💡 Fare ile hücrenin üzerine gelince buton kibarca büyüyerek belirsin */
        .calendar-table td:hover .btn-quick-add,
        td:hover button:not(.btn-add):not(.btn-filter) {
            opacity: 0.85 !important;
            transform: scale(1) !important;
        }

        /* Fare doğrudan artı butonunun üzerine gelince tam parlasın */
        .calendar-table td .btn-quick-add:hover,
        td button:not(.btn-add):not(.btn-filter):hover {
            opacity: 1 !important;
            background-color: #3b82f6 !important; /* Üzerine gelince canlı mavi olur */
            transform: scale(1.1) !important;
        }

        
    </style>
 
</head>
<body>

    <div class="container">
    <h1>💼 Lupus Topluluk Takvimi</h1>


    <!-- ÜST KONTROL PANELİ BUTONLARI -->
    <div class="controls">
        
        <!-- Üst Göz İkonlu Filtre Butonları -->
        <button class="btn" id="filterMember" onclick="filtrele('member')" style="background-color: #0369a1;">👁️ Üyeler</button>
        <button class="btn" id="filterTeam" onclick="filtrele('team')" style="background-color: #5b21b6;">👁️ Takımlar</button>
        <button class="btn" id="filterAcademic" onclick="filtrele('academic')" style="background-color: #991b1b;">👁️ Akademik</button>

        <!-- 🎯 YENİ SEYS SEVİYE ŞİRKET HAVUZ YÖNETİM BUTONU -->
        <button class="btn" onclick="sirketPaneliniAc()" style="background: linear-gradient(135deg, #4f46e5, #3730a3); border: none;">
            💼 Şirket / Havuz Yönetimi
        </button>

        <span style="color: var(--text-muted); margin: 0 10px;">|</span>

        <!-- Ay Değiştirme ve Görev Ekleme -->
        <button class="btn">◀ Önceki Ay</button>
        <span id="month-title">Yükleniyor...</span>
        <button class="btn">Sonraki Ay ▶</button>

        <button class="btn btn-add">+ Görev / Süreç Ekle</button>
    </div>

    <!-- 📌 DINAMIK TAKIM BAZLI ÖZEL GÖSTERİM PANELİ -->
    <div id="takimFiltrePanel" style="display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 14px; border: 1px solid var(--border-color);">
        <span style="color: var(--text-muted); font-size: 13px; font-weight: 700; align-self: center;">📌 Takım Filtresi:</span>
        <div id="dinamikTakimKutulari" style="display: flex; gap: 10px; flex-wrap: wrap;">
            <!-- Takımlar buraya otomatik olarak küçük butonlar şeklinde dizilecek -->
        </div>
    </div>

    <!-- ANA TAKVİM TABLOSU KONTEYNIRI -->
    <div class="calendar-container">
        <table class="calendar-table">
            <thead>
                <tr>
                    <!-- Başlıklar JavaScript ile dinamik dolacak -->
                </tr>
            </thead>
            <tbody>
                <!-- Satırlar JavaScript ile dinamik dolacak -->
            </tbody>
        </table>
    </div>
</div>

<!-- 🔍 CANVAS TOOLTIP (BİLGİ BALONCUĞU KUTUSU) -->
<div id="canvasTooltip" style="display:none; position: fixed; background: #0f172a; color: #f8fafc; padding: 12px; border-radius: 10px; border: 1px solid #475569; font-size: 12px; font-weight: 600; line-height: 1.5; pointer-events: none; z-index: 2000; box-shadow: 0 10px 25px rgba(0,0,0,0.5); max-width: 280px; white-space: pre-line;"></div>

<!-- ========================================================================= -->
<!-- 🏢 PENCERE 1: PREMIUM ŞİRKET / HAVUZ YÖNETİM PANELİ (İK PANELİ) -->
<!-- ========================================================================= -->
<div id="sirketModal" style="display:none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(15,23,42,0.8); justify-content: center; align-items: center; backdrop-filter: blur(8px);">
    <div style="background-color: #1e293b; border: 1px solid #334155; padding: 30px; border-radius: 20px; width: 850px; max-width: 95vw; box-shadow: 0 25px 50px rgba(0,0,0,0.5); color: #f8fafc; max-height: 85vh; overflow-y: auto;">
        
        <!-- Panel Başlığı -->
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 15px; margin-bottom: 20px;">
            <h3 style="margin: 0; font-size: 20px; font-weight: 800; color: #3b82f6; display: flex; align-items: center; gap: 8px;">🏢 Şirket Organizasyon & İK Paneli</h3>
            <button onclick="sirketPaneliniKapat()" style="background: #334155; color: #94a3b8; border: none; padding: 6px 12px; border-radius: 8px; font-weight: 700; cursor: pointer;">Kapat ✖</button>
        </div>

        <!-- ÜST KISIM: YENİ EKLEME FORM ALANLARI -->
        <div style="display: flex; gap: 20px; margin-bottom: 25px;">
            <!-- Yeni Takım Formu -->
            <div style="flex: 1; background: #0f172a; padding: 15px; border-radius: 12px; border: 1px solid #334155;">
                <h4 style="margin: 0 0 12px 0; font-size: 14px; font-weight: 800; color: #8b5cf6;">👥 Yeni Takım / Ekip Tanımla</h4>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="panelTakimAdi" placeholder="Örn: Mekanik Ekibi" style="flex: 1; padding: 10px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: white; font-size: 13px;">
                    <button onclick="paneldenTakimEkle()" style="padding: 10px 16px; background: #8b5cf6; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer;">+ Ekle</button>
                </div>
            </div>

            <!-- Yeni Üye Formu -->
            <div style="flex: 1; background: #0f172a; padding: 15px; border-radius: 12px; border: 1px solid #334155;">
                <h4 style="margin: 0 0 12px 0; font-size: 14px; font-weight: 800; color: #10b981;">👤 Yeni Personel / Üye Kaydet</h4>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <input type="text" id="panelUyeAdi" placeholder="Örn: Ahmet Yılmaz" style="padding: 10px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: white; font-size: 13px;">
                    
                    <!-- Çoklu Takım Seçim Kutusu -->
                    <div style="margin-top: 5px;">
                        <span style="font-size: 11px; font-weight: 700; color: #94a3b8; display: block; margin-bottom: 4px;">Dahil Olacağı Takımlar (Çoklu Seçilebilir):</span>
                        <div id="panelUyeTakimSecenekleri" style="max-height: 70px; overflow-y: auto; background: #1e293b; padding: 6px; border-radius: 8px; border: 1px solid #334155; font-size: 12px; display: flex; flex-direction: column; gap: 4px;">
                            <!-- Dinamik Checkbox'lar gelecek -->
                        </div>
                    </div>
                    
                    <button onclick="paneldenUyeEkle()" style="padding: 10px; background: #10b981; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 5px;">+ Personeli Havuza Kaydet</button>
                </div>
            </div>
        </div>

        <!-- ALT KISIM: MEVCUT LİSTELER (TABLO DÜZENİ) -->
        <div style="display: flex; gap: 20px;">
            <!-- Takım Yönetim Tablosu -->
            <div style="flex: 1;">
                <h4 style="margin: 0 0 8px 0; font-size: 13px; font-weight: 700; color: #94a3b8;">📋 Mevcut Şirket Takımları</h4>
                <div id="ikPanelTakimListesi" style="max-height: 220px; overflow-y: auto; background: #0f172a; border-radius: 12px; border: 1px solid #334155; padding: 10px;">
                    <!-- Takımlar listelenecek -->
                </div>
            </div>

            <!-- Üye Yönetim Tablosu -->
            <div style="flex: 1;">
                <h4 style="margin: 0 0 8px 0; font-size: 13px; font-weight: 700; color: #94a3b8;">📋 Havuzdaki Tüm Çalışanlar</h4>
                <div id="ikPanelUyeListesi" style="max-height: 220px; overflow-y: auto; background: #0f172a; border-radius: 12px; border: 1px solid #334155; padding: 10px;">
                    <!-- Üyeler listelenecek -->
                </div>
            </div>
        </div>

    </div>
</div>


<!-- ========================================================================= -->
<!-- 📝 PENCERE 2: YENİ GÖREV / SÜREÇ EKLEME MODALI -->
<!-- ========================================================================= -->
<div id="formModal" style="display:none; position: fixed; z-index: 4000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(15,23,42,0.8); justify-content: center; align-items: center; backdrop-filter: blur(4px);">
    <div style="background-color: white; padding: 25px; border-radius: 16px; width: 420px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); color: #1e293b; max-height: 90vh; overflow-y: auto;">
        <h3 style="margin-top: 0; font-weight: 800; color: #0f172a; border-bottom: 2px solid #f1f5f9; padding-bottom: 12px;">🚀 Takvime Süreç Planla</h3>
        <form id="taskForm">
            
            <label style="display:block; margin-bottom: 6px; font-weight: bold; font-size: 13px;">Kayıt Türü:</label>
            <select id="typeSelect" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-weight: 600;" required>
                <option value="member">👤 Üye Bireysel Görevi</option>
                <option value="team">👥 Takım Ortak Süreci</option>
                <option value="academic">📅 Okul Akademik Takvimi</option>
            </select>

            <div id="dynamicFields">
                <!-- JavaScript ile form kutuları dolacak -->
            </div>

            <div style="display: flex; gap: 12px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label style="display:block; margin-bottom: 6px; font-weight: bold; font-size: 13px;">Başlangıç:</label>
                    <input type="date" id="startDate" style="width: 88%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px;" required>
                </div>
                <div style="flex: 1;">
                    <label style="display:block; margin-bottom: 6px; font-weight: bold; font-size: 13px;">Bitiş:</label>
                    <input type="date" id="endDate" style="width: 88%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px;" required>
                </div>
            </div>

            <textarea id="description" style="width: 94%; padding: 10px; margin-bottom: 20px; border: 1px solid #cbd5e1; border-radius: 8px;" rows="3" placeholder="Süreç detaylarını yazınız..." required></textarea>

            <div style="display: flex; justify-content: space-between; border-top: 2px solid #f1f5f9; padding-top: 15px;">
                <button type="button" id="btnCancel" style="padding: 12px 20px; background-color: #64748b; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700;">İptal</button>
                <button type="submit" style="padding: 12px 24px; background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 800; box-shadow: 0 4px 12px rgba(37,99,235,0.2);">Planı Kaydet</button>
            </div>
        </form>
    </div>
</div>

<!-- ========================================================================= -->

<!-- ========================================================================= -->
<script>
    // 1. ANA ELEMENT SEÇİMLERİ VE HAFIZA ALANLARI
    const btnAdd = document.querySelector('.btn-add');
    const formModal = document.getElementById('formModal');
    const btnCancel = document.getElementById('btnCancel');
    const typeSelect = document.getElementById('typeSelect');
    const dynamicFields = document.getElementById('dynamicFields');
    const monthTitle = document.getElementById('month-title');
    const sirketModal = document.getElementById('sirketModal');
    
    // Ay Değiştirme Butonları
    const butonlar = document.querySelectorAll('.controls .btn');
    let btnPrev, btnNext;
    butonlar.forEach(btn => {
        if (btn.innerText.includes('Önceki')) btnPrev = btn;
        if (btn.innerText.includes('Sonraki')) btnNext = btn;
    });

    // 24 AYLIK PREMİUM TAKVİM DÖNGÜSÜ
    const aylar = [
        { isim: "Ocak 2026", yil: 2026, ayNo: 0, gunSayisi: 31 },
        { isim: "Şubat 2026", yil: 2026, ayNo: 1, gunSayisi: 28 },
        { isim: "Mart 2026", yil: 2026, ayNo: 2, gunSayisi: 31 },
        { isim: "Nisan 2026", yil: 2026, ayNo: 3, gunSayisi: 30 },
        { isim: "Mayıs 2026", yil: 2026, ayNo: 4, gunSayisi: 31 },
        { isim: "Haziran 2026", yil: 2026, ayNo: 5, gunSayisi: 30 },
        { isim: "Temmuz 2026", yil: 2026, ayNo: 6, gunSayisi: 31 },
        { isim: "Ağustos 2026", yil: 2026, ayNo: 7, gunSayisi: 31 },
        { isim: "Eylül 2026", yil: 2026, ayNo: 8, gunSayisi: 30 },
        { isim: "Ekim 2026", yil: 2026, ayNo: 9, gunSayisi: 31 },
        { isim: "Kasım 2026", yil: 2026, ayNo: 10, gunSayisi: 30 },
        { isim: "Aralık 2026", yil: 2026, ayNo: 11, gunSayisi: 31 },
        { isim: "Ocak 2027", yil: 2027, ayNo: 0, gunSayisi: 31 },
        { isim: "Şubat 2027", yil: 2027, ayNo: 1, gunSayisi: 28 },
        { isim: "Mart 2027", yil: 2027, ayNo: 2, gunSayisi: 31 },
        { isim: "Nisan 2027", yil: 2027, ayNo: 3, gunSayisi: 30 },
        { isim: "Mayıs 2027", yil: 2027, ayNo: 4, gunSayisi: 31 },
        { isim: "Haziran 2027", yil: 2027, ayNo: 5, gunSayisi: 30 },
        { isim: "Temmuz 2027", yil: 2027, ayNo: 6, gunSayisi: 31 },
        { isim: "Ağustos 2027", yil: 2027, ayNo: 7, gunSayisi: 31 },
        { isim: "Eylül 2027", yil: 2027, ayNo: 8, gunSayisi: 30 },
        { isim: "Ekim 2027", yil: 2027, ayNo: 9, gunSayisi: 31 },
        { isim: "Kasım 2027", yil: 2027, ayNo: 10, gunSayisi: 30 },
        { isim: "Aralık 2027", yil: 2027, ayNo: 11, gunSayisi: 31 }
    ];
    
    const acilisTarihi = new Date();
    let mevcutAyIndeks = aylar.findIndex(a => a.yil === acilisTarihi.getFullYear() && a.ayNo === acilisTarihi.getMonth());
    if (mevcutAyIndeks === -1) mevcutAyIndeks = 0;

    // Filtre Hafızaları
    let aktifFiltreler = { member: true, team: true, academic: true };
    let aktifTakimFiltreleri = {};

    // 2. ŞİRKET PANELİ AÇMA / KAPATMA VE VERİ YÜKLEME EYLEMLERİ
    window.sirketPaneliniAc = async function() {
        sirketModal.style.display = 'flex';
        await sirketPaneliVerileriniYukle();
    }

    window.sirketPaneliniKapat = function() {
        sirketModal.style.display = 'none';
        document.getElementById('panelTakimAdi').value = '';
        document.getElementById('panelUyeAdi').value = '';
    }

    // İK Panelindeki Tabloları ve Çoklu Seçim Checkbox Listesini Dolduran Sihirbaz
    async function sirketPaneliVerileriniYukle() {
        const checkboxKutusu = document.getElementById('panelUyeTakimSecenekleri');
        const tListe = document.getElementById('ikPanelTakimListesi');
        const uListe = document.getElementById('ikPanelUyeListesi');

        try {
            const [resTakim, resUye] = await Promise.all([
                fetch('/takimlari-getir'),
                fetch('/uyeleri-getir')
            ]);
            const takimlar = await resTakim.json();
            const uyeler = await resUye.json();

            // A) Üye Kaydetme Formundaki Çoklu Takım Seçim Listesini (Checkbox) Çizelim
            if (checkboxKutusu) {
                if (takimlar.length === 0) {
                    checkboxKutusu.innerHTML = '<span style="color:#64748b;">Önce Sol Taraftan Takım Ekleyin!</span>';
                } else {
                    checkboxKutusu.innerHTML = '';
                    takimlar.forEach(t => {
                        checkboxKutusu.innerHTML += `
                            <label style="display:flex; align-items:center; gap:6px; cursor:pointer; color:#e2e8f0;">
                                <input type="checkbox" name="seciliTakimlarCheckbox" value="${t.takimAdi}"> ${t.takimAdi}
                            </label>
                        `;
                    });
                }
            }

            // B) İK Panelindeki Takım Yönetim Tablosunu Çizelim
            if (tListe) {
                if (takimlar.length === 0) {
                    tListe.innerHTML = '<p style="color:#64748b; margin:0; font-size:12px;">Kayıtlı takım yok.</p>';
                } else {
                    tListe.innerHTML = '';
                    takimlar.forEach(t => {
                        tListe.innerHTML += `
                            <div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid #334155; font-size:12px;">
                                <span style="font-weight:600; color:#e2e8f0;">👥 ${t.takimAdi}</span>
                                <button type="button" onclick="havuzdanTakimSil('${t.id}', '${t.takimAdi}')" style="background:none; border:none; color:#f87171; cursor:pointer; font-weight:700;">🗑️ Sil</button>
                            </div>
                        `;
                    });
                }
            }

            // C) İK Panelindeki Personel Yönetim Tablosunu Çizelim
            if (uListe) {
                if (uyeler.length === 0) {
                    uListe.innerHTML = '<p style="color:#64748b; margin:0; font-size:12px;">Kayıtlı üye yok.</p>';
                } else {
                    uListe.innerHTML = '';
                    uyeler.forEach(u => {
                        const tMetni = (u.takimlar && u.takimlar.length > 0) ? u.takimlar.join(', ') : 'Takımsız';
                        uListe.innerHTML += `
                            <div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid #334155; font-size:12px;">
                                <div style="display:flex; flex-direction:column; text-align:left;">
                                    <span style="font-weight:600; color:#e2e8f0;">👤 ${u.adSoyad}</span>
                                    <span style="font-size:10px; color:#94a3b8;">💼 ${tMetni}</span>
                                </div>
                                <button type="button" onclick="havuzdanUyeSil('${u.id}', '${u.adSoyad}')" style="background:none; border:none; color:#f87171; cursor:pointer; font-weight:700;">🗑️ Sil</button>
                            </div>
                        `;
                    });
                }
            }

        } catch (e) { console.error("İK Paneli yüklenirken hata oldu:", e); }
    }

        // 3. PANEL İÇİ HIZLI EKLEME VE KÖKTEN SİLME SİHRBAZLARI

    // İK Panelinden taptaze yeni bir takım tanımlama fonksiyonu
    window.paneldenTakimEkle = async function() {
        const input = document.getElementById('panelTakimAdi');
        const takimAdi = input.value ? input.value.trim() : "";
        if (!takimAdi) { alert("Lütfen bir takım adı yazınız!"); return; }

        try {
            const response = await fetch('/takim-ekle', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ takimAdi })
            });
            if (response.ok) {
                alert("🎉 Takım şirkete başarıyla tanımlandı!");
                input.value = '';
                await sirketPaneliVerileriniYukle(); // Paneli tazeler
                if (typeof takimFiltrePaneliniCiz === 'function') await takimFiltrePaneliniCiz(); // Üst filtre panelini tazeler
            } else {
                const txt = await response.text();
                alert(txt); // "Bu takım zaten kayıtlı" uyarısı fırlatır
            }
        } catch (e) { alert("Takım eklenirken hata oluştu."); }
    }

    // 🎯 YENİ: İSİM YAZILIRKEN ESKİ TAKIMLARI OTOMATİK BULUP İŞARETLEYEN SİHRBAZ
    document.addEventListener('input', async (e) => {
        if (e.target && e.target.id === 'panelUyeAdi') {
            const yazilanIsim = e.target.value.trim().toLowerCase();
            const checkboxes = document.querySelectorAll('input[name="seciliTakimlarCheckbox"]');
            
            // Eğer isim kutusu boşsa tüm kutucukların işaretini kaldır
            if (!yazilanIsim) {
                checkboxes.forEach(cb => cb.checked = false);
                return;
            }

            try {
                const res = await fetch('/uyeleri-getir');
                const uyeler = await res.json();
                
                // Havuzda bu isimde bir personel var mı bakıyoruz
                const bulunanUye = uyeler.find(u => u.adSoyad.toLowerCase() === yazilanIsim);
                
                if (bulunanUye && bulunanUye.takimlar) {
                    // Personel bulundu! Eski takımları hangileriyse o kutucukları otomatik işaretle
                    checkboxes.forEach(cb => {
                        cb.checked = bulunanUye.takimlar.includes(cb.value);
                    });
                } else {
                    // Eğer yeni biriyse veya tam eşleşme yoksa kutucukları temiz tut
                    checkboxes.forEach(cb => cb.checked = false);
                }
            } catch (err) { console.error(err); }
        }
    });


    // 🎯 YENİ SÜRÜM: HEM KAYDEDEN HEM DE TAKIMLARI ANINDA GÜNCELLEYEN AKILLI BUTON FONKSİYONU
    window.paneldenUyeEkle = async function() {
        const input = document.getElementById('panelUyeAdi');
        const adSoyad = input.value ? input.value.trim() : "";
        if (!adSoyad) { alert("Lütfen personelin adını soyadını yazınız!"); return; }

        // Seçilen tüm checkbox'lardaki güncel takım adlarını topluyoruz
        const checkboxes = document.querySelectorAll('input[name="seciliTakimlarCheckbox"]:checked');
        const seciliTakimlar = [];
        checkboxes.forEach(cb => seciliTakimlar.push(cb.value));

        try {
            const resReal = await fetch('/uye-ekle', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adSoyad, takimlar: seciliTakimlar })
            });

            if (resReal.ok) {
                const sonucMetni = await resReal.text();
                
                if (sonucMetni === "güncellendi") {
                    alert(`🎉 ${adSoyad} isimli personelin takımları başarıyla güncellendi!`);
                } else {
                    alert(`🎉 ${adSoyad} şirketsel havuza sıfırdan başarıyla kaydedildi!`);
                }

                input.value = '';
                // Formdaki checkbox'ları temizleyelim ki bir sonraki kayıtta boş gelsin
                checkboxes.forEach(cb => cb.checked = false);
                
                await sirketPaneliVerileriniYukle(); // Paneldeki tabloları yeniler
                if (typeof takvimiYenile === 'function') await takvimiYenile(); // Ana takvimi yeniler
            } else {
                alert("İşlem sırasında bir hata oluştu.");
            }
        } catch (e) { alert("Personel işlemleri yapılırken hata oluştu."); }
    }


    // Takımı şirketten ve takvimden bir daha gelmemek üzere kökten siler
    window.havuzdanTakimSil = async function(id, takimAdi) {
        let mesaj = `⚠️ DİKKAT: "${takimAdi}" takımını şirketten silmek istediğinize emin misiniz?\n\nBu işlemi yaparsanız, takvime girilmiş olan TÜM TAKIM ORTAK SÜREÇLERİ DE TEMİZLENECEKTİR!`;
        if (confirm(mesaj)) {
            try {
                const response = await fetch(`/takim-sil/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    alert("🗑️ Takım ve tüm süreçleri kökten silindi!");
                    await sirketPaneliVerileriniYukle();
                    if (typeof takimFiltrePaneliniCiz === 'function') await takimFiltrePaneliniCiz();
                    if (typeof takvimiYenile === 'function') await takvimiYenile(); // Takvimi anında sadeleştirir
                }
            } catch (e) { alert("Silme eyleminde teknik hata oluştu."); }
        }
    }

    // Üyeyi şirketten ve takvimden bir daha gelmemek üzere kökten siler
    window.havuzdanUyeSil = async function(id, adSoyad) {
        let mesaj = `⚠️ DİKKAT: "${adSoyad}" isimli personeli şirketten silmek istediğinize emin misiniz?\n\nBu personeli silerseniz, takvimde bu personele atanmış olan TÜM BİREYSEL GÖREVLER DE SİLİNECEKTİR!`;
        if (confirm(mesaj)) {
            try {
                const response = await fetch(`/uye-sil/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    alert("🗑️ Personel ve tüm görevleri şirketten temizlendi!");
                    await sirketPaneliVerileriniYukle();
                    if (typeof takvimiYenile === 'function') await takvimiYenile(); // Takvimi anında sadeleştirir
                }
            } catch (e) { alert("Silme eyleminde teknik hata oluştu."); }
        }
    }

        // 4. DINAMIK TAKIM FILTRELEME PANEL MEKANIZMASI

    // Sunucudaki takımları çekip, üst arayüze göz ikonlu butonlar halinde dizen sihirbaz
    async function takimFiltrePaneliniCiz() {
        const panelKutusu = document.getElementById('dinamikTakimKutulari');
        if (!panelKutusu) return;

        try {
            const res = await fetch('/takimlari-getir');
            const takimlar = await res.json();

            if (takimlar.length === 0) {
                panelKutusu.innerHTML = '<span style="color:#64748b; font-size:12px;">Henüz hiç takım tanımlanmamış.</span>';
                return;
            }

            panelKutusu.innerHTML = '';
            takimlar.forEach(t => {
                // Eğer bu takım hafızada henüz yoksa ilk kez varsayılan olarak TRUE (Açık) yapıyoruz
                if (aktifTakimFiltreleri[t.takimAdi] === undefined) {
                    aktifTakimFiltreleri[t.takimAdi] = true;
                }

                const acikMi = aktifTakimFiltreleri[t.takimAdi];
                const bgRenk = acikMi ? '#475569' : '#1e293b';
                const yaziRenk = acikMi ? '#f8fafc' : '#64748b';
                const ikon = acikMi ? '👁️' : '✖️';
                const opacity = acikMi ? '1' : '0.5';

                panelKutusu.innerHTML += `
                    <button type="button" onclick="tekTakimFiltrele('${t.takimAdi}')" style="padding: 6px 12px; background: ${bgRenk}; color: ${yaziRenk}; border: 1px solid #475569; border-radius: 12px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 4px; opacity: ${opacity}; transition: all 0.2s; border: 1px solid var(--border-color);" id="btnFilter_${t.takimAdi.replace(/\s+/g, '_')}">
                        <span>${ikon}</span> ${t.takimAdi}
                    </button>
                `;
            });
        } catch (e) {
            panelKutusu.innerHTML = '<span style="color:#ef4444; font-size:12px;">Filtreler yüklenemedi.</span>';
        }
    }

    // Filtre panelindeki küçük bir takıma tıklandığında açıp kapatan eylem
    window.tekTakimFiltrele = function(takimAdi) {
        aktifTakimFiltreleri[takimAdi] = !aktifTakimFiltreleri[takimAdi];
        takimFiltrePaneliniCiz(); // Paneli yeni renklere göre tazeler
        if (typeof takvimiYenile === 'function') {
            takvimiYenile(); // Takvimi anında süzerek gizler/gösterir
        }
    }

    // Üstteki ana büyük filtre butonlarının (👁️ Üyeler vb.) çalışma mantığı
    window.filtrele = function(tur) {
        aktifFiltreler[tur] = !aktifFiltreler[tur];
        const btn = document.getElementById('filter' + tur.charAt(0).toUpperCase() + tur.slice(1));
        if (btn) {
            if (aktifFiltreler[tur]) {
                btn.classList.remove('pasif');
                btn.innerHTML = btn.innerHTML.replace('✖️', '👁️');
            } else {
                btn.classList.add('pasif');
                btn.innerHTML = btn.innerHTML.replace('👁️', '✖️');
            }
        }
        takvimiYenile();
    }

        // 5. GÖREV / SÜREÇ EKLEME FORMU AKILLI KONTROL SİSTEMİ
    
    // Büyük mavi "+ Görev / Süreç Ekle" butonuna basınca formu açar
    btnAdd.addEventListener('click', async () => {
        formModal.style.display = 'flex';
        await formVerileriniYukle(); // Seçim listelerini sunucudan taze doldurur
    });
    
    // İptal butonuna basınca formu kapatır ve ilk durumuna (Bireysel görev) sıfırlar
    btnCancel.addEventListener('click', () => {
        formModal.style.display = 'none';
        taskForm.reset();
        typeSelect.value = 'member';
        typeSelect.dispatchEvent(new Event('change'));
    });

    // 🎯 YENİ SÜRÜM: BİREYSEL GÖREVDE TAKIM ZORUNLULUĞUNU KALDIRAN FORM TASARIMI
    typeSelect.addEventListener('change', async (e) => {
        const tur = e.target.value;
        
        if (tur === 'member') {
            // İlgili Takım alanındaki 'required' kelimesini sildik, artık isteğe bağlı!
            dynamicFields.innerHTML = `
                <label style="display:block; margin-bottom: 6px; font-weight: bold; font-size: 13px; color:#1e293b;">İlgili Takım / Ekip (İsteğe Bağlı):</label>
                <select id="teamSelect" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 8px;">
                    <option value="">-- Takım Seçmeden Bağımsız Ekle --</option>
                </select>
                <div id="uyeSecimAlani">
                    <label style="display:block; margin-bottom: 6px; font-weight: bold; font-size: 13px; color:#1e293b;">Görevlendirilen Personel:</label>
                    <select id="userSelect" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 8px;" required>
                        <option value="">Yükleniyor...</option>
                    </select>
                </div>
            `;
            await formVerileriniYukle();
        } else if (tur === 'team') {
            dynamicFields.innerHTML = `
                <label style="display:block; margin-bottom: 6px; font-weight: bold; font-size: 13px; color:#1e293b;">İlgili Takım / Ekip:</label>
                <select id="teamSelect" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 8px;" required>
                    <option value="">Yükleniyor...</option>
                </select>
            `;
            await formVerileriniYukle();
        } else {
            dynamicFields.innerHTML = `
                <label style="display:block; margin-bottom: 6px; font-weight: bold; font-size: 13px; color:#1e293b;">Akademik Süreç Başlığı:</label>
                <input type="text" id="academicTitle" placeholder="Örn: Vize Haftası veya Bütler" style="width: 94%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 15px;" required>
            `;
        }
    });


    // Sunucudan Güncel Takım ve Üyeleri Çekip Form Açılır Menülerine (Select) Dolduran Fonksiyon
    async function formVerileriniYukle() {
        const teamSelect = document.getElementById('teamSelect');
        const userSelect = document.getElementById('userSelect');
        
        try {
            const [resTakim, resUye] = await Promise.all([
                fetch('/takimlari-getir'),
                fetch('/uyeleri-getir')
            ]);
            const takimlar = await resTakim.json();
            const uyeler = await resUye.json();

            // 1. Takım Seçim Listesini Doldurma
            if (teamSelect) {
                if (takimlar.length === 0) {
                    teamSelect.innerHTML = '<option value="">-- Şirket Havuzundan Takım Ekleyin! --</option>';
                } else {
                    teamSelect.innerHTML = '<option value="">-- Takım Seçin --</option>';
                    takimlar.forEach(t => { teamSelect.innerHTML += `<option value="${t.takimAdi}">${t.takimAdi}</option>`; });
                }
            }
            
            // 2. Üye Seçim Listesini Doldurma
            if (userSelect) {
                if (uyeler.length === 0) {
                    userSelect.innerHTML = '<option value="">-- Şirket Havuzundan Personel Ekleyin! --</option>';
                } else {
                    userSelect.innerHTML = '<option value="">-- Personel Seçin --</option>';
                    uyeler.forEach(u => { userSelect.innerHTML += `<option value="${u.adSoyad}">${u.adSoyad}</option>`; });
                }
            }
        } catch (e) { console.error("Form seçim listeleri doldurulamadı:", e); }
    }

        // 6. HÜCRE İÇİ HIZLI EKLEME (+) VE FORM KAYDETME FONKSİYONLARI

    // Takvim hücresindeki küçük mavi artı butonuna tıklandığında çalışan sihirli eylem
    window.hucredenHizliEkle = async function(uyeAdi, takimAdi, gun, ayNo, yil) {
        // Form penceresini açıyoruz
        formModal.style.display = 'flex';
        
        // Form alanlarının (Takım ve Üye seçme kutularının) var olabilmesi için ilk durum tetikleyicisini atıyoruz
        typeSelect.value = 'member';
        typeSelect.dispatchEvent(new Event('change'));
        
        // Seçim listelerini sunucudan taze dolduruyoruz
        await formVerileriniYukle();

        // Tıklanan güne göre tarih formatını ayarlıyoruz (Örn: 2026-06-05)
        const formatliAy = String(ayNo + 1).padStart(2, '0');
        const formatliGun = String(gun).padStart(2, '0');
        const secilenTarihString = `${yil}-${formatliAy}-${formatliGun}`;

        // Formdaki Başlangıç ve Bitiş tarihlerini tık diye o gün yapıyoruz
        document.getElementById('startDate').value = secilenTarihString;
        document.getElementById('endDate').value = secilenTarihString;

        // Form açılır menülerinde, o satırın takımını ve üyesini otomatik seçtiriyoruz
        const teamSelect = document.getElementById('teamSelect');
        const userSelect = document.getElementById('userSelect');
        
        if (teamSelect) teamSelect.value = takimAdi;
        if (userSelect) userSelect.value = uyeAdi;
    }

    // TAKVİME SÜREÇ EKLEME FORMU GÖNDERİLDİĞİNDE (SUBMIT) ÇALIŞAN KAYIT SİHRBAZI
    const taskForm = document.getElementById('taskForm');
    taskForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const recordType = typeSelect.value;
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const description = document.getElementById('description').value;
        
        let displayName = "";
        let takimAdi = "";

        // 🎯 YENİ SÜRÜM: BİREYSEL GÖREVDE TAKIM ZORUNLULUĞUNU KALDIRAN AKILLI KONTROL
        if (recordType === 'member') {
            const ts = document.getElementById('teamSelect');
            const us = document.getElementById('userSelect');
            
            if (!us || !us.value) { alert("Lütfen Görevlendirilen Personeli seçiniz!"); return; }
            
            // Eğer takım seçildiyse değerini alır, seçilmediyse boş metin kalır (Hata vermez!)
            takimAdi = ts ? ts.value : "";
            displayName = us.value; // Personelin adı soyadı
        }

         else if (recordType === 'team') {
            const ts = document.getElementById('teamSelect');
            if (!ts.value) { alert("Lütfen Takım seçiniz!"); return; }
            displayName = ts.value; // Takımın ortak adı
        } else if (recordType === 'academic') {
            displayName = document.getElementById('academicTitle').value; // Akademik Başlık
        }

        const data = { recordType, displayName, takimAdi, startDate, endDate, description };

        try {
            const response = await fetch('/gorev-ekle', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        
            if (response.ok) {
                formModal.style.display = 'none'; 
                taskForm.reset(); 
                typeSelect.value = 'member';
                typeSelect.dispatchEvent(new Event('change'));
                await takvimiYenile(); // Takvimi anında tazeleyip yeni şeridi çizer
            }
        } catch (error) { alert('Süreç kaydedilirken sunucu hatası oluştu!'); }
    });

        // 9.1 GÖREV SİLME VE TAKVİM BAŞLIK DÖNGÜSÜ
    async function gorevSil(id) {
        try {
            const responseGet = await fetch('/gorevleri-getir');
            const gorevler = await responseGet.json();
            const bulunangorev = gorevler.find(g => g.id === id);

            if (bulunangorev) {
                const orijinalAciklamalar = [
                    'Güz Dönemi Ortak Zorunlu Derslerin Final Sınavı', 'Güz Yarıyılı Dönem Sonu Sınavları',
                    'Güz Dönemi Ortak Zorunlu Derslerin Bütünleme Sınavı', 'Güz Yarıyılı Bütünleme Sınavları',
                    'Ortak Zorunlu Dersler Ara Sınavı', 'Bahar Dönemi Vize Sınav Haftası',
                    'Ortak Zorunlu Dersler Final Sınavı', 'Bahar Dönemi Dönem Sonu Sınavları',
                    'Ortak Zorunlu Dersler Bütünleme Sınavı', 'Bahar Dönemi Büt Haftası'
                ];
                if (bulunangorev.recordType === 'academic' && orijinalAciklamalar.includes(bulunangorev.description)) {
                    alert("🔒 Bu resmi kök akademik takvim sürecidir, sistem üzerinden silinemez!");
                    return; 
                }
            }

            if (confirm("Bu görevi silmek istediğinize emin misiniz?")) {
                const responseDel = await fetch(`/gorev-sil/${id}`, { method: 'DELETE' });
                if (responseDel.ok) { 
                    const tooltip = document.getElementById('canvasTooltip');
                    if (tooltip) { tooltip.style.display = 'none'; }
                    setTimeout(async () => { await takvimiYenile(); }, 100);
                }
            }
        } catch (error) { alert("Teknik hata."); }
    }

        // 9.1 TAKVİM YENİLE BAŞLANGICI VE EN ÜSTTEKİ BİREYSEL SÜREÇLER
    async function takvimiYenile() {
        const seciliAy = aylar[mevcutAyIndeks];
        monthTitle.innerText = seciliAy.isim;

        const headerRow = document.querySelector('thead tr');
        headerRow.innerHTML = '<th>Takip Listesi</th>';

        const bugun = new Date();
        const bugunYil = bugun.getFullYear();
        const bugunAy = bugun.getMonth();
        const bugunGun = bugun.getDate();

        for (let i = 1; i <= seciliAy.gunSayisi; i++) {
            if (seciliAy.yil === bugunYil && seciliAy.ayNo === bugunAy && i === bugunGun) {
                headerRow.innerHTML += `<th class="today-highlight" title="Bugün">${i}</th>`;
            } else { headerRow.innerHTML += `<th>${i}</th>`; }
        }

        try {
            const [resGorev, resUye, resTakim] = await Promise.all([
                fetch('/gorevleri-getir'),
                fetch('/uyeleri-getir'),
                fetch('/takimlari-getir')
            ]);
            
            const gorevler = await resGorev.json();
            const uyeler = await resUye.json();
            const takimlar = await resTakim.json();
            
            const tbody = document.querySelector('tbody');
            tbody.innerHTML = ''; 

            let gunlukGorevSayisi = new Array(seciliAy.gunSayisi + 1).fill(0);

            // 🎯 ADIM 1: BİREYSEL GÖREVLİ PERSONELLERİN EN ÜSTTE LİSTELENMESİ
            if (aktifFiltreler['member']) {
                uyeler.forEach(uye => {
                    const üyeninBuAykiBireyselGorevleri = gorevler.filter(g => {
                        if (g.recordType !== 'member' || g.displayName !== uye.adSoyad) return false;
                        const sD = new Date(g.startDate + "T00:00:00");
                        const eD = new Date(g.endDate + "T23:59:59");
                        const kBasIlk = new Date(seciliAy.yil, seciliAy.ayNo, 1, 0, 0, 0);
                        const kBitSon = new Date(seciliAy.yil, seciliAy.ayNo, seciliAy.gunSayisi, 23, 59, 59);
                        const oTakiminOrtakIsiVarMi = gorevler.some(tG => tG.recordType === 'team' && tG.displayName === g.takimAdi);
                        return eD >= kBasIlk && sD <= kBitSon && !oTakiminOrtakIsiVarMi;
                    });

                    if (üyeninBuAykiBireyselGorevleri.length === 0) return;

                    const trUyeSerbest = document.createElement('tr');
                    const tdUyeHeader = document.createElement('td');
                    tdUyeHeader.className = "row-sub-header";
                    tdUyeHeader.style.paddingLeft = "15px !important";
                    tdUyeHeader.innerHTML = `👤 ${uye.adSoyad} (Bireysel)`;
                    trUyeSerbest.appendChild(tdUyeHeader);

                    for (let i = 1; i <= seciliAy.gunSayisi; i++) {
                        const tdDay = document.createElement('td');
                        const kBas = new Date(seciliAy.yil, seciliAy.ayNo, i, 0, 0, 0);
                        const kBit = new Date(seciliAy.yil, seciliAy.ayNo, i, 23, 59, 59);

                        const uSerbestGorevler = üyeninBuAykiBireyselGorevleri.filter(g => {
                            const sD = new Date(g.startDate + "T00:00:00");
                            const eD = new Date(g.endDate + "T23:59:59");
                            return kBit >= sD && kBas <= eD;
                        });

                        if (uSerbestGorevler.length === 0) {
                            tdDay.innerHTML = `<button type="button" class="btn-quick-add" onclick="hucredenHizliEkle('${uye.adSoyad}', '', ${i}, ${seciliAy.ayNo}, ${seciliAy.yil})">+</button>`;
                        } else {
                            tdDay.className = "task-strip task-member";
                            tdDay.innerHTML = uSerbestGorevler.map(g => g.description).join('<div style="border-top:1px dashed rgba(0,0,0,0.15); margin:3px 0;"></div>');
                            tdDay.style.cursor = "pointer";
                            tdDay.style.fontSize = "11px";
                            
                            tdDay.addEventListener('click', () => {
                                if (uSerbestGorevler.length === 1) {
                                     gorevSil(uSerbestGorevler[0].id); }
                                else {
                                    let m = "Silmek istediğiniz görevin numarasını yazın:\n\n";
                                    uSerbestGorevler.forEach((g,idx) => m += `${idx+1} - ${g.description}\n`);
                                    const s = prompt(m); const sIdx = parseInt(s)-1;
                                    if(!isNaN(sIdx) && uSerbestGorevler[sIdx]) gorevSil(uSerbestGorevler[sIdx].id);
                                }
                            });
                            gunlukGorevSayisi[i] += uSerbestGorevler.length;
                        }
                        trUyeSerbest.appendChild(tdDay);
                    }
                    tbody.appendChild(trUyeSerbest);
                });
            }

                        // 9.2 ŞİRKET TAKIMLARININ VE ALTINDAKİ ÜYELERİN LİSTELENMESİ (ORTA SIRA)
            takimlar.forEach(takim => {
                if (!aktifFiltreler['team']) return;
                if (aktifTakimFiltreleri[takim.takimAdi] === false) return;

                const takiminBuAykiOrtakGorevleri = gorevler.filter(g => {
                    if (g.recordType !== 'team' || g.displayName !== takim.takimAdi) return false;
                    const sD = new Date(g.startDate + "T00:00:00");
                    const eD = new Date(g.endDate + "T23:59:59");
                    const kBasIlk = new Date(seciliAy.yil, seciliAy.ayNo, 1, 0, 0, 0);
                    const kBitSon = new Date(seciliAy.yil, seciliAy.ayNo, seciliAy.gunSayisi, 23, 59, 59);
                    return eD >= kBasIlk && sD <= kBitSon;
                });

                if (takiminBuAykiOrtakGorevleri.length === 0) return;

                const trTakim = document.createElement('tr');
                const tdTakimHeader = document.createElement('td');
                tdTakimHeader.className = "row-header group-team";
                tdTakimHeader.innerHTML = `👥 ${takim.takimAdi}`;
                trTakim.appendChild(tdTakimHeader);

                for (let i = 1; i <= seciliAy.gunSayisi; i++) {
                    const tdDay = document.createElement('td');
                    const kBas = new Date(seciliAy.yil, seciliAy.ayNo, i, 0, 0, 0);
                    const kBit = new Date(seciliAy.yil, seciliAy.ayNo, i, 23, 59, 59);

                    const tGorevler = gorevler.filter(g => {
                        if (g.recordType !== 'team' || g.displayName !== takim.takimAdi) return false;
                        const sD = new Date(g.startDate + "T00:00:00");
                        const eD = new Date(g.endDate + "T23:59:59");
                        return kBit >= sD && kBas <= eD;
                    });

                    if (tGorevler.length > 0) {
                        tdDay.className = "task-strip task-team";
                        tdDay.innerHTML = tGorevler.map(g => g.description).join('<div style="border-top:1px dashed rgba(0,0,0,0.15); margin:3px 0;"></div>');
                        tdDay.style.cursor = "pointer";
                        tdDay.style.fontSize = "11px";
                        tdDay.addEventListener('click', () => {
                            if (tGorevler.length === 1) { gorevSil(tGorevler[0].id); }
                            else {
                                let m = "Silmek istediğiniz görevin numarasını yazın:\n\n";
                                tGorevler.forEach((g,idx) => m += `${idx+1} - ${g.description}\n`);
                                const s = prompt(m); const sIdx = parseInt(s)-1;
                                if(!isNaN(sIdx) && tGorevler[sIdx]) gorevSil(tGorevler[sIdx].id);
                            }
                        });
                        gunlukGorevSayisi[i] += tGorevler.length;
                    }
                    trTakim.appendChild(tdDay);
                }
                tbody.appendChild(trTakim);

                if (aktifFiltreler['member']) {
                    uyeler.forEach(uye => {
                        if (!uye.takimlar || !uye.takimlar.includes(takim.takimAdi)) return;

                        const trUye = document.createElement('tr');
                        const tdUyeHeader = document.createElement('td');
                        tdUyeHeader.className = "row-sub-header";
                        tdUyeHeader.innerHTML = `👤 ${uye.adSoyad}`;
                        trUye.appendChild(tdUyeHeader);

                        for (let i = 1; i <= seciliAy.gunSayisi; i++) {
                            const tdDay = document.createElement('td');
                            const kBas = new Date(seciliAy.yil, seciliAy.ayNo, i, 0, 0, 0);
                            const kBit = new Date(seciliAy.yil, seciliAy.ayNo, i, 23, 59, 59);

                            const uGorevler = gorevler.filter(g => {
                                if (g.recordType !== 'member' || g.displayName !== uye.adSoyad || g.takimAdi !== takim.takimAdi) return false;
                                const sD = new Date(g.startDate + "T00:00:00");
                                const eD = new Date(g.endDate + "T23:59:59");
                                return kBit >= sD && kBas <= eD;
                            });

                            if (uGorevler.length === 0) {
                                tdDay.innerHTML = `<button type="button" class="btn-quick-add" onclick="hucredenHizliEkle('${uye.adSoyad}', '${takim.takimAdi}', ${i}, ${seciliAy.ayNo}, ${seciliAy.yil})">+</button>`;
                            } else {
                                tdDay.className = "task-strip task-member";
                                tdDay.innerHTML = uGorevler.map(g => g.description).join('<div style="border-top:1px dashed rgba(0,0,0,0.15); margin:3px 0;"></div>');
                                tdDay.style.cursor = "pointer";
                                tdDay.style.fontSize = "11px";

                                let tooltipMetni = `👤 Görevli: ${uye.adSoyad}\n👥 Takım: ${takim.takimAdi}\n⚠️ Hücrede ${uGorevler.length} süreç var:\n`;
                                uGorevler.forEach((g, idx) => { tooltipMetni += `\n${idx + 1}. Süreç: ${g.description}\n📅 Tarih: ${g.startDate} - ${g.endDate}\n`; });

                                tdDay.addEventListener('mouseenter', () => { const t = document.getElementById('canvasTooltip'); if (t) { t.innerText = tooltipMetni; t.style.display = 'block'; } });
                                tdDay.addEventListener('mousemove', (e) => { const t = document.getElementById('canvasTooltip'); if (t) { t.style.left = (e.clientX + 15) + 'px'; t.style.top = (e.clientY + 15) + 'px'; } });
                                tdDay.addEventListener('mouseleave', () => { const t = document.getElementById('canvasTooltip'); if (t) t.style.display = 'none'; });

                                tdDay.addEventListener('click', () => {
                                    if (uGorevler.length === 1) { gorevSil(uGorevler[0].id); }
                                    else {
                                        let m = "Silmek istediğiniz görevin numarasını yazın:\n\n";
                                        uGorevler.forEach((g,idx) => m += `${idx+1} - ${g.description}\n`);
                                        const s = prompt(m); const sIdx = parseInt(s)-1;
                                        if(!isNaN(sIdx) && uGorevler[sIdx]) gorevSil(uGorevler[sIdx].id);
                                    }
                                });
                                gunlukGorevSayisi[i] += uGorevler.length;
                            }
                            trUye.appendChild(tdDay);
                        }
                        tbody.appendChild(trUye);
                    });
                }
            });

                        // 9.3 AKADEMİK SINAV SATIRI VE ORTAK MÜSAİTLİK ÇUBUĞU
            if (aktifFiltreler['academic']) {
                const trAcad = document.createElement('tr');
                const tdAcadHeader = document.createElement('td');
                tdAcadHeader.className = "row-header group-academic";
                tdAcadHeader.innerHTML = `📅 Akademik Takvim`;
                trAcad.appendChild(tdAcadHeader);

                for (let i = 1; i <= seciliAy.gunSayisi; i++) {
                    const tdDay = document.createElement('td');
                    const kBas = new Date(seciliAy.yil, seciliAy.ayNo, i, 0, 0, 0);
                    const kBit = new Date(seciliAy.yil, seciliAy.ayNo, i, 23, 59, 59);

                    const aGorevler = gorevler.filter(g => {
                        if (g.recordType !== 'academic') return false;
                        const sD = new Date(g.startDate + "T00:00:00");
                        const eD = new Date(g.endDate + "T23:59:59");
                        return kBit >= sD && kBas <= eD;
                    });

                    if (aGorevler.length > 0) {
                        tdDay.className = "task-strip task-academic";
                        tdDay.innerHTML = aGorevler.map(g => g.description).join('<div style="border-top:1px dashed rgba(0,0,0,0.15); margin:3px 0;"></div>');
                        tdDay.style.cursor = "pointer";
                        tdDay.style.fontSize = "11px";
                        tdDay.addEventListener('click', () => {
                            if (aGorevler.length === 1) { gorevSil(aGorevler.id); }
                            else {
                                let m = "Silmek istediğiniz görevin numarasını yazın:\n\n";
                                aGorevler.forEach((g,idx) => m += `${idx+1} - ${g.description}\n`);
                                const s = prompt(m); const sIdx = parseInt(s)-1;
                                if(!isNaN(sIdx) && aGorevler[sIdx]) gorevSil(aGorevler[sIdx].id);
                            }
                        });
                        gunlukGorevSayisi[i] += aGorevler.length;
                    }
                    trAcad.appendChild(tdDay);
                }
                tbody.appendChild(trAcad);
            }

            // ORTAK MÜSAİTLİK DURUM SATIRI
            const newAvRow = document.createElement('tr');
            newAvRow.className = "availability-row";
            newAvRow.innerHTML = '<td>🧭 Ortak Müsaitlik</td>';
            for (let i = 1; i <= seciliAy.gunSayisi; i++) {
                if (gunlukGorevSayisi[i] === 0) { newAvRow.innerHTML += '<td class="status-available">Müsait</td>'; } 
                else { newAvRow.innerHTML += `<td class="status-busy">⚠️ ${gunlukGorevSayisi[i]} Meşgul</td>`; }
            }
            tbody.appendChild(newAvRow);

        } catch (error) { console.error("Takvim çizilirken hata oldu:", error); }
    }


    // Sağa sola buton tetikleyicileri
    if (btnPrev) btnPrev.addEventListener('click', () => { if (mevcutAyIndeks > 0) { mevcutAyIndeks--; takvimiYenile(); } });
    if (btnNext) btnNext.addEventListener('click', () => { if (mevcutAyIndeks < aylar.length - 1) { mevcutAyIndeks++; takvimiYenile(); } });

    // İLK AÇILIŞ TETİKLEYİCİLERİ
    takimFiltrePaneliniCiz();
    takvimiYenile();


</script>
</body>
</html>
